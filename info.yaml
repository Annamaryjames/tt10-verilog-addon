# Tiny Tapeout project information
project:
  title:        "Kogge-Stone Adder Demo"  # Project title
  author:       "Anna"                    # Your name
  discord:      ""                         # Your Discord username (optional)
  description:  "Perform addition"         # One-line description
  language:     "Verilog"                  # HDL language
  clock_hz:     0                          # No clock required

  # Tiny Tapeout Tile Size (Should match your design size)
  tiles: "2x2"  # Options: 1x1, 1x2, 2x2, etc.

  # Top module name (Must start with `tt_um_`)
  top_module:  "tt_um_addon"

  # Source files
  source_files:
    - "project.v"

# Pinout mapping for Tiny Tapeout
pinout:
  # Inputs (A)
  ui[0]: "A[0]"
  ui[1]: "A[1]"
  ui[2]: "A[2]"
  ui[3]: "A[3]"
  ui[4]: "A[4]"
  ui[5]: "A[5]"
  ui[6]: "A[6]"
  ui[7]: "A[7]"

  # Outputs (Sum)
  uo[0]: "Sum[0]"
  uo[1]: "Sum[1]"
  uo[2]: "Sum[2]"
  uo[3]: "Sum[3]"
  uo[4]: "Sum[4]"
  uo[5]: "Sum[5]"
  uo[6]: "Sum[6]"
  uo[7]: "Sum[7]"

  # Bidirectional (Cout)
  uio[0]: "Cout"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
